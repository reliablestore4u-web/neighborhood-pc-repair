<body>

<header class="site-header">
  <div class="logo">
    <a href="index.html"><img src="logo.png" alt="Neighborhood PC Repair"></a>
  </div>

  <span class="menu-toggle" onclick="toggleMenu()">☰</span>

  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>

    <a href="contact.html" class="active">Contact</a>
  </nav>

  <div class="social-links">
    <a href="https://www.facebook.com/people/Neighborhood-PC-Repair/61579330904599/" target="_blank"><i class="fab fa-facebook-f"></i></a>
    <a href="https://www.instagram.com/neighborhoodpcrepair?igsh=Mmpua3AxOHZnbzQ4" target="_blank"><i class="fab fa-instagram"></i></a>

</header>

<!-- Hero Section -->
<section class="hero" style="background-image:url('hero-bg.jpg'); min-height:60vh;">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Contact Us</h1>
    <p>Get in touch and we’ll help you with your tech issues quickly and locally.</p>
  </div>
</section>

<!-- Contact Form -->
<section class="section scroll-reveal">
  <h2>Send a Message</h2>
  <form id="contact-form" action="https://formspree.io/f/mandpwed" method="POST">
    <label for="name">Name</label>
    <input type="text" name="name" id="name" required>
    
    <label for="email">Email</label>
    <input type="email" name="_replyto" id="email" required>
    
    <label for="message">Message</label>
    <textarea name="message" id="message" rows="5" required></textarea>
    
    <button type="submit">Send</button>
    <p id="thank-you-msg" style="display:none; color:green; margin-top:10px;">Thank you! Your message has been sent.</p>
  </form>
</section>

<!-- Footer -->
<footer>
  <div class="footer-links">
    <a href="index.html">Home</a> | 
    <a href="services.html">Services</a> | 
    <a href="about.html">About</a> | 
    <a href="contact.html">Contact</a>
  </div>
  <div class="footer-social">
    <a href="https://www.facebook.com/people/Neighborhood-PC-Repair/61579330904599/" target="_blank"><i class="fab fa-facebook-f"></i></a>
    <a href="https://www.instagram.com/neighborhoodpcrepair?igsh=Mmpua3AxOHZnbzQ4" target="_blank"><i class="fab fa-instagram"></i></a>
  </div>
  <p>© 2026 Neighborhood PC Repair</p>
</footer>

<!-- Contact FAB -->
<button class="contact-fab" onclick="toggleContactMenu()"><i class="fas fa-phone"></i></button>

  <a href="tel:+16472210789" title="Call"><i class="fas fa-phone"></i></a>

</div>

</body>
</html>
